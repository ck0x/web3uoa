# fly.toml app configuration file generated for web3-prod on 2026-03-20T15:25:35+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'web3-prod'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
